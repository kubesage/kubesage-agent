replicaCount: 1

image:
  repository: ghcr.io/kubesage/kubesage-agent
  pullPolicy: IfNotPresent
  tag: ""  # Defaults to chart appVersion

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  create: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

env:
  KUBESAGE_API_URL: ""
  KUBESAGE_ENDPOINT: ""
  KUBESAGE_TOKEN: ""
  KUBESAGE_CLUSTER_NAME: ""
  OTEL_EXPORTER_OTLP_ENDPOINT: ""

nodeSelector: {}
tolerations: []
affinity: {}
